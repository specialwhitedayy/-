<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ประตูเงินประตูทอง | การ์ด 15 ใบ</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans Thai","Segoe UI",sans-serif;background:#120300;color:#fff}
body{
background:
radial-gradient(circle at 50% -10%,rgba(255,226,130,.88),transparent 26%),
radial-gradient(circle at 18% 18%,rgba(255,72,46,.30),transparent 22%),
radial-gradient(circle at 85% 22%,rgba(255,201,71,.25),transparent 20%),
linear-gradient(160deg,#120300,#471000 50%,#070100);
}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.48;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.5px),radial-gradient(circle,#ffd66b 0 1.2px,transparent 1.8px);background-size:72px 72px,118px 118px;animation:spark 20s linear infinite}
@keyframes spark{to{background-position:280px -280px,-240px 240px}}
.wrap{position:relative;min-height:100vh;padding:max(18px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center}
.header{text-align:center;margin-top:4px;text-shadow:0 8px 24px #000}
.badge{display:inline-block;padding:7px 16px;border-radius:99px;background:rgba(255,215,94,.14);border:1px solid rgba(255,226,135,.45);color:#ffe39b;font-weight:900;font-size:clamp(15px,2vw,23px)}
h1{margin:8px 0 2px;font-size:clamp(38px,7vw,86px);line-height:.95;font-weight:1000;background:linear-gradient(#fff8c9,#ffd15f 45%,#9c5100);-webkit-background-clip:text;color:transparent;filter:drop-shadow(0 8px 6px rgba(0,0,0,.55))}
.sub{font-size:clamp(15px,2.1vw,25px);font-weight:800;color:#fff1bf}
.menu{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0 8px}
button{border:0;border-radius:999px;padding:12px 18px;background:linear-gradient(#fff7ca,#ffc13d);color:#361200;font-weight:1000;font-size:15px;box-shadow:0 8px 18px rgba(0,0,0,.34)}
.section{width:min(1220px,100%);margin:12px auto 0}
.section-title{text-align:center;font-size:clamp(22px,3.3vw,42px);font-weight:1000;color:#ffe2a1;text-shadow:0 6px 18px #000;margin:16px 0 14px}
.grid{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:clamp(10px,1.4vw,16px)}
.card{position:relative;border-radius:20px;overflow:hidden;background:#2a0b00;box-shadow:0 12px 30px rgba(0,0,0,.55);border:2px solid rgba(255,223,137,.55);cursor:pointer;transform:translateZ(0)}
.card img{width:100%;display:block;aspect-ratio:1/1;object-fit:cover}
.card .label{position:absolute;left:9px;top:9px;background:rgba(70,18,0,.88);border:1px solid rgba(255,232,174,.55);border-radius:999px;padding:5px 10px;font-weight:1000;color:#ffe5a7}
.card .tap{position:absolute;right:9px;bottom:9px;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:5px 10px;font-weight:800;color:white;font-size:12px}
.game-grid{display:grid;grid-template-columns:repeat(5,minmax(105px,1fr));gap:clamp(10px,1.4vw,18px)}
.pick{aspect-ratio:3/4.05;perspective:1200px;cursor:pointer;user-select:none}
.inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .78s cubic-bezier(.18,.9,.18,1)}
.pick.open .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;box-shadow:0 14px 32px rgba(0,0,0,.45),inset 0 0 0 2px rgba(255,255,255,.18)}
.front{background:radial-gradient(circle at 50% 22%,rgba(255,255,255,.36),transparent 22%),linear-gradient(145deg,#fff0a5,#d49318 42%,#773000);border:2px solid rgba(255,236,148,.95)}
.front:before{content:"";position:absolute;inset:9px;border:2px dashed rgba(255,255,255,.58);border-radius:17px}
.num{z-index:1;font-weight:1000;text-shadow:0 4px 8px rgba(0,0,0,.4)}
.num b{display:block;font-size:clamp(34px,4.8vw,62px)}
.num span{font-size:clamp(12px,1.4vw,18px);color:#fff9df}
.back{transform:rotateY(180deg);background:#111}
.back img{width:100%;height:100%;object-fit:cover}
.footer{width:min(1220px,100%);display:flex;align-items:center;justify-content:space-between;gap:12px;color:#ffe5a0;font-weight:900;margin-top:12px}
.preview{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;z-index:20;align-items:center;justify-content:center;padding:18px}
.preview.show{display:flex}
.preview img{max-width:96vw;max-height:92vh;border-radius:24px;box-shadow:0 20px 80px #000;border:2px solid rgba(255,226,145,.7)}
.preview .x{position:fixed;right:18px;top:18px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:999px;padding:10px 14px;font-weight:1000}
@media(max-width:820px){.grid,.game-grid{grid-template-columns:repeat(3,minmax(92px,1fr))}.footer{font-size:14px}}
</style>
</head>
<body>
<div class="wrap">
<header class="header">
  <div class="badge">🎊 ประตูเงินประตูทอง</div>
  <h1>สวรรค์หรือนรก</h1>
  <div class="sub">การ์ด 15 ใบ เรียงแบบสลับลำดับ พร้อมกดดูรูปเต็ม</div>
</header>

<div class="menu">
  <button onclick="document.getElementById('gallery').scrollIntoView({behavior:'smooth'})">ดูการ์ดทั้งหมด</button>
  <button onclick="document.getElementById('game').scrollIntoView({behavior:'smooth'})">เล่นแบบพลิกการ์ด</button>
  <button onclick="resetFlip()">รีเซ็ตการ์ด</button>
</div>

<section class="section" id="gallery">
  <div class="section-title">การ์ดภารกิจ 15 ใบ</div>
  <div class="grid" id="galleryGrid"></div>
</section>

<section class="section" id="game">
  <div class="section-title">โหมดพลิกการ์ด</div>
  <div class="game-grid" id="gameGrid"></div>
  <footer class="footer">
    <div id="status">เปิดแล้ว 0 / 15 ใบ</div>
    <button onclick="resetFlip()">เริ่มใหม่</button>
  </footer>
</section>
</div>

<div class="preview" id="preview" onclick="this.classList.remove('show')">
  <button class="x">ปิด ✕</button>
  <img id="previewImg" src="">
</div>

<script>
const order = [1, 6, 2, 9, 12, 3, 10, 4, 7, 13, 5, 11, 8, 14, 15];
let opened = 0;
const galleryGrid = document.getElementById("galleryGrid");
const gameGrid = document.getElementById("gameGrid");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const statusEl = document.getElementById("status");

function openPreview(n){
  previewImg.src = `cards/card${n}.jpg`;
  preview.classList.add("show");
}

function buildGallery(){
  galleryGrid.innerHTML = "";
  order.forEach((n, idx)=>{
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `<span class="label">ลำดับ ${idx+1} / ใบ ${n}</span><img src="cards/card${n}.jpg" alt="การ์ดใบที่ ${n}"><span class="tap">แตะดูเต็ม</span>`;
    d.onclick = ()=>openPreview(n);
    galleryGrid.appendChild(d);
  });
}

function buildGame(){
  gameGrid.innerHTML = "";
  opened = 0;
  order.forEach((n, idx)=>{
    const c = document.createElement("div");
    c.className = "pick";
    c.dataset.card = n;
    c.innerHTML = `<div class="inner">
      <div class="face front"><div class="num"><b>${idx+1}</b><span>แตะเปิด</span></div></div>
      <div class="face back"><img src="cards/card${n}.jpg" alt="การ์ดใบที่ ${n}"></div>
    </div>`;
    c.onclick = () => {
      if(!c.classList.contains("open")) {
        c.classList.add("open");
        opened++;
        updateStatus();
      } else {
        openPreview(n);
      }
    };
    gameGrid.appendChild(c);
  });
  updateStatus();
}

function resetFlip(){ buildGame(); }
function updateStatus(){ statusEl.textContent = `เปิดแล้ว ${opened} / 15 ใบ`; }

buildGallery();
buildGame();
</script>
</body>
</html>
